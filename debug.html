<!DOCTYPE html>
<html>
<head><title>Debug</title></head>
<body style="font-family:monospace; white-space:pre; padding:20px">
<h2>DEBUG SUPABASE</h2>
<div id="log"></div>

<script src="supabase-config.js"></script>
<script>
var cfg = window.PN_SUPABASE_CONFIG;
var log = document.getElementById('log');

log.textContent += 'Config cargada: ' + (cfg ? 'SI' : 'NO') + '\n';
if (cfg) {
  log.textContent += 'URL: ' + cfg.SUPABASE_URL + '\n';
  log.textContent += 'KEY: ' + cfg.SUPABASE_ANON_KEY.substring(0,20) + '...\n\n';
  
  var url = cfg.SUPABASE_URL + '/rest/v1/companies_public?select=*&limit=1';
  log.textContent += 'Intentando fetch...\n';
  
  fetch(url, {
    headers: {
      'apikey': cfg.SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + cfg.SUPABASE_ANON_KEY
    }
  }).then(r => {
    log.textContent += 'Status: ' + r.status + '\n';
    return r.text();
  }).then(t => {
    log.textContent += 'Response:\n' + t;
  }).catch(e => {
    log.textContent += 'Error: ' + e.message;
  });
}
</script>
</body>
</html>
